apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-api
  namespace: relay
  labels:
    app: relay-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay-api
  template:
    metadata:
      labels:
        app: relay-api
    spec:
      containers:
      - name: relay-api
        image: ghcr.io/4gly/relay-api:sha-30c3ca4defe68cf0e5f1a83ba1e042022ef41ee8
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: RELAY_ADDR
          value: ":8080"
        - name: RELAY_BASE_URL
          value: "https://relay.4gly.dev"
        - name: RELAY_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: relay-secrets
              key: database_url
        - name: RELAY_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: relay-secrets
              key: api_token
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-curator-worker
  namespace: relay
  labels:
    app: relay-curator-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay-curator-worker
  template:
    metadata:
      labels:
        app: relay-curator-worker
    spec:
      containers:
      - name: relay-curator-worker
        image: ghcr.io/4gly/relay-api:sha-30c3ca4defe68cf0e5f1a83ba1e042022ef41ee8
        imagePullPolicy: Always
        command:
        - /app/relay-worker
        env:
        - name: RELAY_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: relay-secrets
              key: database_url
        - name: RELAY_CURATOR_WORKER_ID
          value: relay-curator-worker
        - name: RELAY_CURATOR_PROVIDER
          value: rule-based
        - name: RELAY_CURATOR_BATCH_SIZE
          value: "5"
        - name: RELAY_CURATOR_POLL_INTERVAL
          value: 5s
        - name: RELAY_CURATOR_LEASE_DURATION
          value: 30s
        - name: RELAY_CURATOR_RETRY_BACKOFF
          value: 30s
        - name: RELAY_CURATOR_MAX_ATTEMPTS
          value: "5"
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
