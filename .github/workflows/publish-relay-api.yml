name: publish-relay-api

on:
  push:
    branches:
      - main
    paths-ignore:
      - "deploy/k8s/**"
      - "README.md"

permissions:
  contents: write

jobs:
  build-and-sync-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: registry.4gly.dev
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.4gly.dev/library/relay-api:main
            registry.4gly.dev/library/relay-api:sha-${{ github.sha }}

      - name: Update deployment image tag
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          path = Path("deploy/k8s/deployment.yaml")
          text = path.read_text()
          desired = "image: registry.4gly.dev/library/relay-api:sha-${{ github.sha }}"
          text, count = re.subn(
              r"image: (ghcr\.io/4gly/relay-api:(bootstrap|sha-[0-9a-f]{40})|registry\.4gly\.dev/library/relay-api:(main|sha-[0-9a-f]{40}))",
              desired,
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update deployment image tag")
          path.write_text(text)
          PY

      - name: Commit manifest update
        run: |
          if git diff --quiet -- deploy/k8s/deployment.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/deployment.yaml
          git commit -m "chore: deploy relay-api image sha-${{ github.sha }}"
          git push
