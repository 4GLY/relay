        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Project-scoped key does not match requested project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      tags: [style-memory]
      summary: List heuristic proposals for a project
      description: |
        Returns a paginated list of heuristic proposals for the given project.
        Accepts either an admin bearer token or a relay_session cookie that
        owns the requested project. Cursor is an ISO-8601 created_at keyset.
      operationId: listHeuristicProposals
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: string
        - in: query
          name: project
          schema:
            type: string
          description: Optional project name; ignored when project_id is provided.
        - in: query
          name: state
          schema:
            type: string
            enum: [pending, approved, rejected, archived]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 50
        - in: query
          name: cursor
          schema:
            type: string
          description: ISO-8601 timestamp returned in next_cursor of the previous page.
      responses:
        '200':
          description: Heuristic proposals listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListHeuristicProposalsResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid session cookie / admin bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not an admin or owner of the requested project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/approved-heuristics:
    get:
      tags: [style-memory]
      summary: List approved heuristics for a project
      description: |
        Returns a paginated list of approved heuristics for the given project.
        Accepts either an admin bearer token or a relay_session cookie that
        owns the requested project. Cursor is an ISO-8601 created_at keyset.
      operationId: listApprovedHeuristics
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: string
        - in: query
          name: project
          schema:
            type: string
          description: Optional project name; ignored when project_id is provided.
        - in: query
          name: workflow
          schema:
            type: string
        - in: query
          name: artifact_type
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 50
        - in: query
          name: cursor
          schema:
            type: string
          description: ISO-8601 timestamp returned in next_cursor of the previous page.
      responses:
