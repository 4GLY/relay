openapi: 3.1.0
info:
  title: Relay API
  version: 0.1.0
  summary: API-first second-brain backend for long-running AI-assisted work.
servers:
  - url: http://127.0.0.1:8080
    description: Local development
  - url: https://relay.4gly.dev
    description: Production
tags:
  - name: health
  - name: memory
  - name: style-memory
  - name: snapshots
  - name: public-snapshot
  - name: auth
  - name: onboarding
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque token
    CookieAuth:
      type: apiKey
      in: cookie
      name: relay_session
  schemas:
    SuccessEnvelope:
      type: object
      required: [ok, command, data, warnings]
      properties:
        ok:
          type: boolean
          const: true
        command:
          type: string
        data: {}
        warnings:
          type: array
          items:
            type: string
    ErrorEnvelope:
      type: object
      required: [ok, command, error]
      properties:
        ok:
          type: boolean
          const: false
        command:
          type: string
        error:
          type: object
          required: [code, message, retryable]
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
            missing_fields:
              type: array
              items:
                type: string
    HealthData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok
    CaptureInput:
      type: object
      properties:
        project:
          type: string
          description: Optional canonical project name. If omitted, the server may infer the project from repo_path for normal flows or use the bound project when it safely matches a project-scoped key.
        repo_path:
          type: string
          description: Optional repo path artifact to attach. When project is omitted, the basename may be used as the inferred project name.
        handoff_path:
          type: string
          description: Optional handoff markdown path to attach.
        design_path:
          type: string
          description: Optional design document path to attach.
        extra_artifacts:
          type: array
          description: Optional additional trusted artifacts such as changed-files manifests, code paths, or PR diffs.
          items:
            $ref: '#/components/schemas/CaptureArtifactInput'
        source:
          type: string
          default: manual
          description: Optional memory source such as chat, markdown, or manual. Defaults to manual when omitted.
        body:
          type: string
          description: Optional raw memory text to store. `note` is accepted as an alias.
        note:
          type: string
          description: Alias for body. Optional raw memory text to store.
        idempotency_key:
          type: string
          description: Optional but recommended write key for retries.
    CaptureResult:
      type: object
      required: [project_id, created_note_ids, created_artifact_ids]
      properties:
        project_id:
          type: string
        created_note_ids:
          type: array
          items:
            type: string
        created_artifact_ids:
          type: array
          items:
            type: string
    CaptureArtifactInput:
      type: object
      required: [type, source_path]
      properties:
        type:
          type: string
          description: Artifact type such as code_path, changed_files, or pr_diff.
        source_path:
          type: string
          description: Canonical path for the artifact.
        trust_level:
          type: string
          description: Optional trust level. Defaults to trusted.
    PromoteInput:
      type: object
      properties:
        project:
          type: string
        kind:
          type: string
          enum: [decision, question]
        summary:
          type: string
        reason:
          type: string
        source_note_ids:
          type: array
          items:
            type: string
        source_artifact_ids:
          type: array
          items:
            type: string
        idempotency_key:
          type: string
      required: [project, kind, summary, reason]
    PromoteResult:
      type: object
      required: [kind, object_id, project_id]
      properties:
        kind:
          type: string
        object_id:
          type: string
        project_id:
          type: string
    JudgmentTraceWriteInput:
      type: object
      required: [task_id, agent_id, decision, rationale]
      properties:
        project:
          type: string
        project_id:
          type: string
        task_id:
          type: string
        agent_id:
          type: string
        workflow:
          type: string
          example: design_handoff
        artifact_type:
          type: string
          example: design_doc
        decision:
          type: string
        alternatives:
          type: array
          items:
            type: string
        rationale:
          type: string
        constraints:
          type: array
          items:
            type: string
        source_refs:
          type: array
          items:
            type: string
        language:
          type: string
        idempotency_key:
          type: string
    JudgmentTraceWriteResult:
      type: object
      required: [trace_id, project_id]
      properties:
        trace_id:
          type: string
        project_id:
          type: string
        curator_job_id:
          type: string
          description: Stable queued curator job id when curator queueing is enabled.
    HeuristicProposalCreateInput:
      type: object
      required: [heuristic_key, canonical_text]
      properties:
        project:
          type: string
        project_id:
          type: string
        origin_trace_id:
          type: string
        workflow:
          type: string
        artifact_type:
          type: string
        heuristic_key:
          type: string
        canonical_text:
          type: string
        normalized_text:
          type: string
        source_trace_ids:
          type: array
          items:
            type: string
        source_refs:
          type: array
          items:
            type: string
        proposed_by:
          type: string
        idempotency_key:
          type: string
    HeuristicProposalCreateResult:
      type: object
      required: [proposal_id, project_id, state]
      properties:
        proposal_id:
          type: string
        project_id:
          type: string
        state:
          type: string
          enum: [pending, approved, rejected, archived]
    HeuristicProposalReviewInput:
      type: object
      required: [proposal_id, action]
      properties:
        project:
          type: string
        project_id:
          type: string
        proposal_id:
          type: string
        action:
          type: string
          enum: [approve, reject, archive]
        review_notes:
          type: string
    HeuristicProposalReviewResult:
      type: object
      required: [proposal_id, project_id, state]
      properties:
        proposal_id:
          type: string
        approved_heuristic_id:
          type: string
        project_id:
          type: string
        state:
          type: string
          enum: [approved, rejected, archived]
    ApprovedHeuristicUpdateInput:
      type: object
      required: [heuristic_id, action]
      properties:
        project:
          type: string
        project_id:
          type: string
        heuristic_id:
          type: string
        action:
          type: string
          enum: [disable, archive, approve, enable]
    PendingProposalSummary:
      type: object
      required: [proposal_id, project_id, heuristic_key, canonical_text, state, created_at, updated_at]
      properties:
        proposal_id:
          type: string
        project_id:
          type: string
        origin_trace_id:
          type: string
        workflow:
          type: string
        artifact_type:
          type: string
        heuristic_key:
          type: string
        canonical_text:
          type: string
        normalized_text:
          type: string
        state:
          type: string
          enum: [pending, approved, rejected, archived]
        source_trace_ids:
          type: array
          items:
            type: string
        source_refs:
          type: array
          items:
            type: string
        proposed_by:
          type: string
        review_notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListHeuristicProposalsResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PendingProposalSummary'
        next_cursor:
          type: string
          description: ISO-8601 timestamp keyset cursor; pass back as ?cursor= to fetch the next page.
    ApprovedHeuristicSummary:
      type: object
      required: [heuristic_id, project_id, heuristic_key, canonical_text, state, created_at, updated_at]
      properties:
        heuristic_id:
          type: string
        project_id:
          type: string
        origin_proposal_id:
          type: string
        workflow:
          type: string
        artifact_type:
          type: string
        heuristic_key:
          type: string
        canonical_text:
          type: string
        state:
          type: string
          enum: [approved, archived, disabled]
        source_trace_ids:
          type: array
          items:
            type: string
        source_refs:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListApprovedHeuristicsResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApprovedHeuristicSummary'
        next_cursor:
          type: string
          description: ISO-8601 timestamp keyset cursor; pass back as ?cursor= to fetch the next page.
    ApprovedHeuristicUpdateResult:
      type: object
      required: [heuristic_id, project_id, state]
      properties:
        heuristic_id:
          type: string
        project_id:
          type: string
        state:
          type: string
          enum: [approved, archived, disabled]
    PacketStyleCue:
      type: object
      required: [heuristic_id, why_selected, source_summary]
      properties:
        heuristic_id:
          type: string
        heuristic_key:
          type: string
        canonical_text:
          type: string
        why_selected:
          type: string
        why_included:
          type: string
        source_summary:
          type: string
        source_refs:
          type: array
          items:
            type: string
    PacketNote:
      type: object
      required: [note_id, excerpt]
      properties:
        note_id:
          type: string
        source:
          type: string
        excerpt:
          type: string
        evidence:
          type: string
    PacketDecision:
      type: object
      required: [decision_id, summary]
      properties:
        decision_id:
          type: string
        summary:
          type: string
        why:
          type: string
    PacketQuestion:
      type: object
      required: [question_id, summary]
      properties:
        question_id:
          type: string
        summary:
          type: string
    PacketArtifact:
      type: object
      required: [artifact_id, type]
      properties:
        artifact_id:
          type: string
        type:
          type: string
        source_path:
          type: string
        trust_level:
          type: string
        why_included:
          type: string
    PacketBuildInput:
      type: object
      required: [project]
      properties:
        project:
          type: string
        type:
          type: string
          example: resume
        target:
          type: string
          example: codex
        workflow:
          type: string
          example: design_handoff
        artifact_type:
          type: string
          example: design_doc
        task_summary:
          type: string
          description: Optional current-task summary used in the rendered packet body and supporting-artifact ranking.
        disable_style_cues:
          type: boolean
        disable_retrieval:
          type: boolean
        persist_snapshot:
          type: boolean
        idempotency_key:
          type: string
    PacketBuildResult:
      type: object
      required:
        - packet_id
        - project_id
        - type
        - target
        - body
        - decision_ids
        - open_question_ids
        - source_artifact_ids
        - missing_context
      properties:
        packet_id:
          type: string
        snapshot_id:
          type: string
        project_id:
          type: string
        schema_version:
          type: string
        type:
          type: string
        target:
          type: string
        task_summary:
          type: string
        retrieval_mode:
          type: string
          enum: [query-conditioned, ranking-only]
        body:
          type: string
        rendered_body:
          type: string
        style_cues:
          type: array
          items:
            $ref: '#/components/schemas/PacketStyleCue'
        supporting_notes:
          type: array
          items:
            $ref: '#/components/schemas/PacketNote'
        supporting_decisions:
          type: array
          items:
            $ref: '#/components/schemas/PacketDecision'
        supporting_questions:
          type: array
          items:
            $ref: '#/components/schemas/PacketQuestion'
        supporting_artifacts:
          type: array
          items:
            $ref: '#/components/schemas/PacketArtifact'
        why_included:
          type: array
          items:
            type: string
        decision_ids:
          type: array
          items:
            type: string
        open_question_ids:
          type: array
          items:
            type: string
        source_artifact_ids:
          type: array
          items:
            type: string
        approved_heuristic_ids:
          type: array
          items:
            type: string
        missing_context:
          type: array
          items:
            type: string
    ShowResult:
      type: object
      required:
        - project_id
        - note_count
        - artifact_count
        - decision_count
        - open_question_count
      properties:
        project_id:
          type: string
        note_count:
          type: integer
        artifact_count:
          type: integer
        decision_count:
          type: integer
        open_question_count:
          type: integer
        latest_packet_id:
          type: string
    ProjectGraphNode:
      type: object
      required: [id, kind]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [project, note, artifact, decision, open_question]
        title:
          type: string
        source:
          type: string
        source_path:
          type: string
        trust_level:
          type: string
    ProjectGraphEdge:
      type: object
      required: [type, from, to]
      properties:
        type:
          type: string
          enum: [includes, derived_from, possible_support, possible_answer]
        from:
          type: string
        to:
          type: string
        status:
          type: string
          enum: [candidate]
        score:
          type: integer
        why_included:
          type: string
    ProjectGraphResult:
      type: object
      required: [project_id, nodes, edges]
      properties:
        project_id:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ProjectGraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/ProjectGraphEdge'
    ProjectRetrieveHit:
      type: object
      required: [kind, id, score]
      properties:
        kind:
          type: string
          enum: [note, artifact, decision, open_question]
        id:
          type: string
        score:
          type: integer
        title:
          type: string
        excerpt:
          type: string
        source:
          type: string
        source_path:
          type: string
        trust_level:
          type: string
        why_included:
          type: string
        source_ref_ids:
          type: array
          items:
            type: string
    ProjectRetrieveResult:
      type: object
      required: [project_id, query, hits]
      properties:
        project_id:
          type: string
        query:
          type: string
        hits:
          type: array
          items:
            $ref: '#/components/schemas/ProjectRetrieveHit'
    ProjectExplorerProject:
      type: object
      required: [project_id, name, status]
      properties:
        project_id:
          type: string
        name:
          type: string
        status:
          type: string
    ProjectExplorerCounts:
      type: object
      required:
        - notes
        - artifacts
        - decisions
        - open_questions
        - judgment_traces
        - pending_proposals
        - approved_heuristics
        - rejected_proposals
        - packet_snapshots
      properties:
        notes:
          type: integer
        artifacts:
          type: integer
        decisions:
          type: integer
        open_questions:
          type: integer
        judgment_traces:
          type: integer
        pending_proposals:
          type: integer
        approved_heuristics:
          type: integer
        rejected_proposals:
          type: integer
        packet_snapshots:
          type: integer
    ProjectExplorerSnapshot:
      type: object
      required: [snapshot_id, packet_kind, target, created_at, public_readable]
      properties:
        snapshot_id:
          type: string
        packet_kind:
          type: string
        target:
          type: string
        task_summary:
          type: string
        created_at:
          type: string
          format: date-time
        public_readable:
          type: boolean
        public_token:
          type: string
    ProjectExplorerStyleMemory:
      type: object
      properties:
        next_proposal_id:
          type: string
        next_proposal_text:
          type: string
    ProjectExplorerActivity:
      type: object
      required: [kind, id, title, created_at]
      properties:
        kind:
          type: string
          enum: [judgment_trace, approved_heuristic]
        id:
          type: string
        title:
          type: string
        created_at:
          type: string
          format: date-time
    ProjectExplorerResult:
      type: object
      required: [project, counts, style_memory, recent_activity]
      properties:
        project:
          $ref: '#/components/schemas/ProjectExplorerProject'
        counts:
          $ref: '#/components/schemas/ProjectExplorerCounts'
        latest_snapshot:
          $ref: '#/components/schemas/ProjectExplorerSnapshot'
        style_memory:
          $ref: '#/components/schemas/ProjectExplorerStyleMemory'
        recent_activity:
          type: array
          items:
            $ref: '#/components/schemas/ProjectExplorerActivity'
    JudgmentTraceSummary:
      type: object
      required: [trace_id, project_id, decision, created_at]
      properties:
        trace_id:
          type: string
        project_id:
          type: string
        task_id:
          type: string
        agent_id:
          type: string
        workflow:
          type: string
        artifact_type:
          type: string
        decision:
          type: string
        rationale:
          type: string
        source_refs:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
    ListJudgmentTracesResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JudgmentTraceSummary'
        next_cursor:
          type: string
    IssueAPIKeyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scope:
          type: string
          enum: [global, project]
        project:
          type: string
        project_id:
          type: string
      allOf:
        - if:
            properties:
              scope:
                const: project
            required: [scope]
          then:
            anyOf:
              - required: [project]
              - required: [project_id]
    IssueAPIKeyResult:
      type: object
      required: [key_id, name, token, token_prefix, scope]
      properties:
        key_id:
          type: string
        name:
          type: string
        token:
          type: string
        token_prefix:
          type: string
        scope:
          type: string
          enum: [global, project]
        project_id:
          type: string
    APIKeySummary:
      type: object
      required: [key_id, name, token_prefix, scope, revoked]
      properties:
        key_id:
          type: string
        name:
          type: string
        token_prefix:
          type: string
        scope:
          type: string
          enum: [global, project]
        project_id:
          type: string
        revoked:
          type: boolean
    ListAPIKeysResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/APIKeySummary'
    RevokeAPIKeyInput:
      type: object
      required: [key_id]
      properties:
        key_id:
          type: string
    RevokeAPIKeyResult:
      type: object
      required: [key_id, name, token_prefix, scope, revoked]
      properties:
        key_id:
          type: string
        name:
          type: string
        token_prefix:
          type: string
        scope:
          type: string
          enum: [global, project]
        project_id:
          type: string
        revoked:
          type: boolean
    AuthMeData:
      type: object
      required: [user_id, onboarding_complete]
      properties:
        user_id:
          type: string
        email:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string
        onboarding_complete:
          type: boolean
          description: True when the user has completed the V2 first-run onboarding flow. This does not require an Anthropic key.
        default_project_id:
          type: string
          description: The user's "Personal" project, auto-created at onboarding (D4). Stable across repeated onboarding calls and DELETE — preserved so prior packets remain attached.
        last_validated_at:
          type: string
          format: date-time
          description: Timestamp of the last successful Anthropic key validation, when a later provider-key flow is connected. Null for keyless onboarding.
    OnboardingCompleteInput:
      type: object
      additionalProperties: false
      description: No provider key is required to complete first-run onboarding.
    OnboardingCompleteResult:
      type: object
      required: [onboarding_complete, default_project_id]
      properties:
        onboarding_complete:
          type: boolean
        default_project_id:
          type: string
          description: ID of the user's "Personal" project, created idempotently on first onboarding (D4).
    OnboardingCompleteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OnboardingCompleteResult'
    OnboardingDeleteData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok
    OnboardingDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OnboardingDeleteData'
    ProviderCredentialUpsertInput:
      type: object
      required: [provider, api_key]
      additionalProperties: false
      properties:
        provider:
          type: string
          enum: [anthropic]
        api_key:
          type: string
          description: Provider API key. Encrypted at rest and never returned.
    ProviderCredentialStatus:
      type: object
      required: [provider, connected]
      properties:
        provider:
          type: string
          enum: [anthropic]
        connected:
          type: boolean
        key_prefix:
          type: string
          description: Display-safe leading key fragment.
        key_last4:
          type: string
          description: Display-safe trailing key fragment.
        updated_at:
          type: string
          format: date-time
    ProviderCredentialListData:
      type: object
      required: [credentials]
      properties:
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/ProviderCredentialStatus'
    ProviderCredentialDeleteData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok
    ProviderCredentialStatusResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ProviderCredentialStatus'
    ProviderCredentialListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ProviderCredentialListData'
    ProviderCredentialDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ProviderCredentialDeleteData'
    AuthLogoutData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok
    AuthMeResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthMeData'
    AuthLogoutResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthLogoutData'
    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HealthData'
    CaptureResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CaptureResult'
    PromoteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PromoteResult'
    JudgmentTraceWriteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
