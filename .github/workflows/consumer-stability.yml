name: consumer-stability

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of repeated consumer stability batches"
        required: true
        default: "3"
      fixture_limit:
        description: "Number of fixtures to use. Use 0 for all fixtures."
        required: true
        default: "1"
      judge_model:
        description: "Claude model for consumer and judge calls"
        required: true
        default: "opus"
      codex_model:
        description: "Optional Codex model override"
        required: false
        default: ""
      min_consumer_runs:
        description: "Soft-gate minimum consumer continuation runs"
        required: true
        default: "3"
      min_packet_only_rate:
        description: "Soft-gate minimum packet-only pass rate"
        required: true
        default: "1.0"
      min_codex_style:
        description: "Soft-gate minimum Codex style_match"
        required: true
        default: "4.0"
      min_claude_style:
        description: "Soft-gate minimum Claude style_match"
        required: true
        default: "4.0"
      min_codex_readiness:
        description: "Soft-gate minimum Codex continuation readiness"
        required: true
        default: "4.0"
      min_claude_readiness:
        description: "Soft-gate minimum Claude continuation readiness"
        required: true
        default: "4.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: consumer-stability-${{ github.ref }}
  cancel-in-progress: false

jobs:
  consumer-stability:
    runs-on: [self-hosted, linux, x64, relay-evals]
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: relay
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relay -d relay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RELAY_ADDR: :8080
      RELAY_BASE_URL: http://127.0.0.1:8080
      RELAY_DATABASE_URL: postgresql://relay:relay@127.0.0.1:5432/relay?sslmode=disable
      RELAY_ADMIN_TOKEN: relay-admin-token-ci
      RELAY_API_TOKEN: relay-admin-token-ci
      RELAY_ACCEPTANCE_OUTPUT_ROOT: .gstack/projects/relay-consumer-stability
      RELAY_EVAL_CONSUMER_STABILITY_PREFIX: consumer-stability-${{ github.run_id }}-${{ github.run_attempt }}
      RELAY_EVAL_CONSUMER_STABILITY_RUNS: ${{ inputs.runs }}
      RELAY_EVAL_CONSUMER_STABILITY_FIXTURE_LIMIT: ${{ inputs.fixture_limit }}
      RELAY_EVAL_JUDGE_MODEL: ${{ inputs.judge_model }}
      RELAY_EVAL_CODEX_CONSUMER_MODEL: ${{ inputs.codex_model }}
      RELAY_EVAL_MIN_CONSUMER_RUNS: ${{ inputs.min_consumer_runs }}
      RELAY_EVAL_MIN_CONSUMER_PACKET_ONLY_PASS_RATE: ${{ inputs.min_packet_only_rate }}
      RELAY_EVAL_MIN_CONSUMER_CODEX_STYLE_MATCH: ${{ inputs.min_codex_style }}
      RELAY_EVAL_MIN_CONSUMER_CLAUDE_STYLE_MATCH: ${{ inputs.min_claude_style }}
      RELAY_EVAL_MIN_CONSUMER_CODEX_CONTINUATION_READINESS: ${{ inputs.min_codex_readiness }}
      RELAY_EVAL_MIN_CONSUMER_CLAUDE_CONTINUATION_READINESS: ${{ inputs.min_claude_readiness }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install agent CLIs
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -g @openai/codex@0.124.0

      - name: Verify agent auth is configured
        run: |
          if [[ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]]; then
            echo "Repository secret CLAUDE_CODE_OAUTH_TOKEN is required for consumer-stability." >&2
            exit 1
          fi
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "Repository secret OPENAI_API_KEY is required for Codex consumer-stability." >&2
            exit 1
          fi
          echo "CODEX_HOME=${RUNNER_TEMP}/codex-home" >> "${GITHUB_ENV}"
          export CODEX_HOME="${RUNNER_TEMP}/codex-home"
          mkdir -p "${CODEX_HOME}"
          printenv OPENAI_API_KEY | codex login --with-api-key
          codex login status

      - name: Run consumer stability
        run: ./scripts/ci/run_consumer_stability.sh

      - name: Clean up Codex auth
        if: always()
        run: |
          if [[ -n "${CODEX_HOME:-}" ]]; then
            rm -rf "${CODEX_HOME}"
          fi

      - name: Upload consumer stability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-stability-${{ github.run_id }}-${{ github.run_attempt }}
          path: .gstack/projects/relay-consumer-stability
          if-no-files-found: ignore
