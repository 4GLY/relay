name: usage-validation-gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: usage-validation-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  usage-validation:
    runs-on: [self-hosted, Linux, X64, relay-evals]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: relay
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relay -d relay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RELAY_ADDR: :8080
      RELAY_BASE_URL: http://127.0.0.1:8080
      RELAY_DATABASE_URL: postgresql://relay:relay@127.0.0.1:5432/relay?sslmode=disable
      RELAY_ADMIN_TOKEN: relay-admin-token-ci
      RELAY_API_TOKEN: relay-admin-token-ci
      RELAY_ACCEPTANCE_OUTPUT_ROOT: .gstack/projects/relay-ci
      RELAY_EVAL_BATCH_ID: usage-validation-pr-${{ github.run_id }}-${{ github.run_attempt }}
      RELAY_EVAL_JUDGE_MODEL: opus
      RELAY_EVAL_MIN_RETRIEVAL_AWARE_WIN_RATE: "0.6"
      RELAY_EVAL_MIN_AVG_RETRIEVAL_CONTINUATION_READINESS: "3.5"
      RELAY_EVAL_MIN_AVG_RETRIEVAL_EVIDENCE_RELEVANCE: "3.5"
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude auth is configured
        run: |
          if [[ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]]; then
            echo "Repository secret CLAUDE_CODE_OAUTH_TOKEN is required for usage-validation-gate." >&2
            exit 1
          fi

      - name: Run usage validation gate
        run: |
          set +e
          ./scripts/ci/run_usage_validation_gate.sh
          status="$?"
          set -e
          if [[ "$status" -eq 75 ]]; then
            {
              echo "## Usage Validation Degraded"
              echo
              echo "Claude returned a provider usage-limit response, so the LLM judge gate could not run canonically."
              echo "Running deterministic Go tests with CI service env cleared as the required-check fallback."
            } >> "${GITHUB_STEP_SUMMARY}"
            env -u RELAY_DATABASE_URL -u RELAY_ADMIN_TOKEN -u RELAY_API_TOKEN go test ./...
            exit 0
          fi
          exit "$status"

      - name: Upload usage validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: usage-validation-gate-${{ github.run_id }}-${{ github.run_attempt }}
          path: .gstack/projects/relay-ci
          if-no-files-found: ignore
