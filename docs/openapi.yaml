openapi: 3.1.0
info:
  title: Relay API
  version: 0.1.0
  summary: API-first second-brain backend for long-running AI-assisted work.
servers:
  - url: http://127.0.0.1:8080
    description: Local development
  - url: https://relay.4gly.dev
    description: Production
tags:
  - name: health
  - name: memory
  - name: style-memory
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque token
  schemas:
    SuccessEnvelope:
      type: object
      required: [ok, command, data, warnings]
      properties:
        ok:
          type: boolean
          const: true
        command:
          type: string
        data: {}
        warnings:
          type: array
          items:
            type: string
    ErrorEnvelope:
      type: object
      required: [ok, command, error]
      properties:
        ok:
          type: boolean
          const: false
        command:
          type: string
        error:
          type: object
          required: [code, message, retryable]
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
            missing_fields:
              type: array
              items:
                type: string
    HealthData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok
    CaptureInput:
      type: object
      properties:
        project:
          type: string
          description: Optional canonical project name. If omitted, the server may infer the project from repo_path for normal flows or use the bound project when it safely matches a project-scoped key.
        repo_path:
          type: string
          description: Optional repo path artifact to attach. When project is omitted, the basename may be used as the inferred project name.
        handoff_path:
          type: string
          description: Optional handoff markdown path to attach.
        design_path:
          type: string
          description: Optional design document path to attach.
        extra_artifacts:
          type: array
          description: Optional additional trusted artifacts such as changed-files manifests, code paths, or PR diffs.
          items:
            $ref: '#/components/schemas/CaptureArtifactInput'
        source:
          type: string
          default: manual
          description: Optional memory source such as chat, markdown, or manual. Defaults to manual when omitted.
        body:
          type: string
          description: Optional raw memory text to store. `note` is accepted as an alias.
        note:
          type: string
          description: Alias for body. Optional raw memory text to store.
        idempotency_key:
          type: string
          description: Optional but recommended write key for retries.
    CaptureResult:
      type: object
      required: [project_id, created_note_ids, created_artifact_ids]
      properties:
        project_id:
          type: string
        created_note_ids:
          type: array
          items:
            type: string
        created_artifact_ids:
          type: array
          items:
            type: string
    CaptureArtifactInput:
      type: object
      required: [type, source_path]
      properties:
        type:
          type: string
          description: Artifact type such as code_path, changed_files, or pr_diff.
        source_path:
          type: string
          description: Canonical path for the artifact.
        trust_level:
          type: string
          description: Optional trust level. Defaults to trusted.
    PromoteInput:
      type: object
      properties:
        project:
          type: string
        kind:
          type: string
          enum: [decision, question]
        summary:
          type: string
        reason:
          type: string
        source_note_ids:
          type: array
          items:
            type: string
        source_artifact_ids:
          type: array
          items:
            type: string
        idempotency_key:
          type: string
      required: [project, kind, summary, reason]
    PromoteResult:
      type: object
      required: [kind, object_id, project_id]
      properties:
        kind:
          type: string
        object_id:
          type: string
        project_id:
          type: string
    JudgmentTraceWriteInput:
      type: object
      required: [task_id, agent_id, decision, rationale]
      properties:
        project:
          type: string
        project_id:
          type: string
        task_id:
          type: string
        agent_id:
          type: string
        workflow:
          type: string
          example: design_handoff
        artifact_type:
          type: string
          example: design_doc
        decision:
          type: string
        alternatives:
          type: array
          items:
            type: string
        rationale:
          type: string
        constraints:
          type: array
          items:
            type: string
        source_refs:
          type: array
          items:
            type: string
        language:
          type: string
        idempotency_key:
          type: string
    JudgmentTraceWriteResult:
      type: object
      required: [trace_id, project_id]
      properties:
        trace_id:
          type: string
        project_id:
          type: string
        curator_job_id:
          type: string
          description: Stable queued curator job id when curator queueing is enabled.
    HeuristicProposalCreateInput:
      type: object
      required: [heuristic_key, canonical_text]
      properties:
        project:
          type: string
        project_id:
          type: string
        origin_trace_id:
          type: string
        workflow:
          type: string
        artifact_type:
          type: string
        heuristic_key:
          type: string
        canonical_text:
          type: string
        normalized_text:
          type: string
        source_trace_ids:
          type: array
          items:
            type: string
        source_refs:
          type: array
          items:
            type: string
        proposed_by:
          type: string
        idempotency_key:
          type: string
    HeuristicProposalCreateResult:
      type: object
      required: [proposal_id, project_id, state]
      properties:
        proposal_id:
          type: string
        project_id:
          type: string
        state:
          type: string
          enum: [pending, approved, rejected, archived]
    HeuristicProposalReviewInput:
      type: object
      required: [proposal_id, action]
      properties:
        project:
          type: string
        project_id:
          type: string
        proposal_id:
          type: string
        action:
          type: string
          enum: [approve, reject, archive]
        review_notes:
          type: string
    HeuristicProposalReviewResult:
      type: object
      required: [proposal_id, project_id, state]
      properties:
        proposal_id:
          type: string
        approved_heuristic_id:
          type: string
        project_id:
          type: string
        state:
          type: string
          enum: [approved, rejected, archived]
    ApprovedHeuristicUpdateInput:
      type: object
      required: [heuristic_id, action]
      properties:
        project:
          type: string
        project_id:
          type: string
        heuristic_id:
          type: string
        action:
          type: string
          enum: [disable, archive, approve, enable]
    ApprovedHeuristicUpdateResult:
      type: object
      required: [heuristic_id, project_id, state]
      properties:
        heuristic_id:
          type: string
        project_id:
          type: string
        state:
          type: string
          enum: [approved, archived, disabled]
    PacketStyleCue:
      type: object
      required: [heuristic_id, why_selected, source_summary]
      properties:
        heuristic_id:
          type: string
        heuristic_key:
          type: string
        canonical_text:
          type: string
        why_selected:
          type: string
        why_included:
          type: string
        source_summary:
          type: string
        source_refs:
          type: array
          items:
            type: string
    PacketNote:
      type: object
      required: [note_id, excerpt]
      properties:
        note_id:
          type: string
        source:
          type: string
        excerpt:
          type: string
        evidence:
          type: string
    PacketDecision:
      type: object
      required: [decision_id, summary]
      properties:
        decision_id:
          type: string
        summary:
          type: string
        why:
          type: string
    PacketQuestion:
      type: object
      required: [question_id, summary]
      properties:
        question_id:
          type: string
        summary:
          type: string
    PacketArtifact:
      type: object
      required: [artifact_id, type]
      properties:
        artifact_id:
          type: string
        type:
          type: string
        source_path:
          type: string
        trust_level:
          type: string
        why_included:
          type: string
    PacketBuildInput:
      type: object
      required: [project]
      properties:
        project:
          type: string
        type:
          type: string
          example: resume
        target:
          type: string
          example: codex
        workflow:
          type: string
          example: design_handoff
        artifact_type:
          type: string
          example: design_doc
        task_summary:
          type: string
          description: Optional current-task summary used in the rendered packet body and supporting-artifact ranking.
        disable_style_cues:
          type: boolean
        persist_snapshot:
          type: boolean
        idempotency_key:
          type: string
    PacketBuildResult:
      type: object
      required:
        - packet_id
        - project_id
        - type
        - target
        - body
        - decision_ids
        - open_question_ids
        - source_artifact_ids
        - missing_context
      properties:
        packet_id:
          type: string
        snapshot_id:
          type: string
        project_id:
          type: string
        schema_version:
          type: string
        type:
          type: string
        target:
          type: string
        task_summary:
          type: string
        body:
          type: string
        rendered_body:
          type: string
        style_cues:
          type: array
          items:
            $ref: '#/components/schemas/PacketStyleCue'
        supporting_notes:
          type: array
          items:
            $ref: '#/components/schemas/PacketNote'
        supporting_decisions:
          type: array
          items:
            $ref: '#/components/schemas/PacketDecision'
        supporting_questions:
          type: array
          items:
            $ref: '#/components/schemas/PacketQuestion'
        supporting_artifacts:
          type: array
          items:
            $ref: '#/components/schemas/PacketArtifact'
        why_included:
          type: array
          items:
            type: string
        decision_ids:
          type: array
          items:
            type: string
        open_question_ids:
          type: array
          items:
            type: string
        source_artifact_ids:
          type: array
          items:
            type: string
        approved_heuristic_ids:
          type: array
          items:
            type: string
        missing_context:
          type: array
          items:
            type: string
    ShowResult:
      type: object
      required:
        - project_id
        - note_count
        - artifact_count
        - decision_count
        - open_question_count
      properties:
        project_id:
          type: string
        note_count:
          type: integer
        artifact_count:
          type: integer
        decision_count:
          type: integer
        open_question_count:
          type: integer
        latest_packet_id:
          type: string
    IssueAPIKeyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scope:
          type: string
          enum: [global, project]
        project:
          type: string
        project_id:
          type: string
      allOf:
        - if:
            properties:
              scope:
                const: project
            required: [scope]
          then:
            anyOf:
              - required: [project]
              - required: [project_id]
    IssueAPIKeyResult:
      type: object
      required: [key_id, name, token, token_prefix, scope]
      properties:
        key_id:
          type: string
        name:
          type: string
        token:
          type: string
        token_prefix:
          type: string
        scope:
          type: string
          enum: [global, project]
        project_id:
          type: string
    APIKeySummary:
      type: object
      required: [key_id, name, token_prefix, scope, revoked]
      properties:
        key_id:
          type: string
        name:
          type: string
        token_prefix:
          type: string
        scope:
          type: string
          enum: [global, project]
        project_id:
          type: string
        revoked:
          type: boolean
    ListAPIKeysResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/APIKeySummary'
    RevokeAPIKeyInput:
      type: object
      required: [key_id]
      properties:
        key_id:
          type: string
    RevokeAPIKeyResult:
      type: object
      required: [key_id, name, token_prefix, scope, revoked]
      properties:
        key_id:
          type: string
        name:
          type: string
        token_prefix:
          type: string
        scope:
          type: string
          enum: [global, project]
        project_id:
          type: string
        revoked:
          type: boolean
    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HealthData'
    CaptureResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CaptureResult'
    PromoteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PromoteResult'
    JudgmentTraceWriteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/JudgmentTraceWriteResult'
    HeuristicProposalCreateResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HeuristicProposalCreateResult'
    HeuristicProposalReviewResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HeuristicProposalReviewResult'
    ApprovedHeuristicUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ApprovedHeuristicUpdateResult'
    PacketBuildResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PacketBuildResult'
    ShowResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ShowResult'
    IssueAPIKeyResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/IssueAPIKeyResult'
    ListAPIKeysResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ListAPIKeysResult'
    RevokeAPIKeyResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RevokeAPIKeyResult'
paths:
  /healthz:
    get:
      tags: [health]
      summary: Health check
      operationId: healthz
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/api-keys:
    get:
      tags: [memory]
      summary: List issued API keys
      operationId: listApiKeys
      security:
        - BearerAuth: []
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAPIKeysResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/api-keys/issue:
    post:
      tags: [memory]
      summary: Issue a new reusable API key
      operationId: issueApiKey
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueAPIKeyInput'
      responses:
        '200':
          description: API key issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueAPIKeyResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/api-keys/revoke:
    post:
      tags: [memory]
      summary: Revoke a previously issued API key
      operationId: revokeApiKey
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeAPIKeyInput'
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeAPIKeyResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/capture:
    post:
      tags: [memory]
      summary: Capture raw memory and optional artifacts
      operationId: captureMemory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureInput'
      responses:
        '200':
          description: Capture accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/promote:
    post:
      tags: [memory]
      summary: Promote raw memory into a decision or open question
      operationId: promoteMemory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteInput'
      responses:
        '200':
          description: Promotion accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/judgment-traces:
    post:
      tags: [style-memory]
      summary: Write a judgment trace for later style-memory evolution
      operationId: writeJudgmentTrace
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JudgmentTraceWriteInput'
      responses:
        '200':
          description: Judgment trace written
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JudgmentTraceWriteResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Project-scoped key does not match requested project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/heuristic-proposals:
    post:
      tags: [style-memory]
      summary: Create a pending heuristic proposal
      operationId: createHeuristicProposal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeuristicProposalCreateInput'
      responses:
        '200':
          description: Heuristic proposal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeuristicProposalCreateResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Project-scoped key does not match requested project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/heuristic-proposals/review:
    post:
      tags: [style-memory]
      summary: Approve, reject, or archive a heuristic proposal
      operationId: reviewHeuristicProposal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeuristicProposalReviewInput'
      responses:
        '200':
          description: Heuristic proposal reviewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeuristicProposalReviewResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bootstrap admin bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Requested project does not match proposal project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Heuristic proposal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/approved-heuristics/update:
    post:
      tags: [style-memory]
      summary: Update approved heuristic state
      operationId: updateApprovedHeuristic
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovedHeuristicUpdateInput'
      responses:
        '200':
          description: Approved heuristic updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovedHeuristicUpdateResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bootstrap admin bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Requested project does not match heuristic project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Approved heuristic not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/packets/build:
    post:
      tags: [memory]
      summary: Build an agent-ready packet from stored memory
      operationId: buildPacket
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PacketBuildInput'
      responses:
        '200':
          description: Packet built
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketBuildResponse'
        '400':
          description: Invalid input
