name: publish-relay-api

on:
  push:
    branches:
      - main
    paths-ignore:
      - "deploy/k8s/**"
      - "README.md"

permissions:
  contents: write
  packages: write

jobs:
  build-and-sync-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/4gly/relay-api:main
            ghcr.io/4gly/relay-api:sha-${{ github.sha }}

      - name: Update deployment image tag
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path("deploy/k8s/deployment.yaml")
          text = path.read_text()
          old = "image: ghcr.io/4gly/relay-api:bootstrap"
          if "image: ghcr.io/4gly/relay-api:sha-" in text:
              import re
              text = re.sub(r"image: ghcr.io/4gly/relay-api:sha-[0-9a-f]{40}", f"image: ghcr.io/4gly/relay-api:sha-${{ github.sha }}", text)
          else:
              text = text.replace(old, f"image: ghcr.io/4gly/relay-api:sha-${{ github.sha }}")
          path.write_text(text)
          PY

      - name: Commit manifest update
        env:
          RELAY_PUSH_TOKEN: ${{ secrets.RELAY_PUSH_TOKEN }}
        run: |
          if git diff --quiet -- deploy/k8s/deployment.yaml; then
            exit 0
          fi
          if [[ -z "${RELAY_PUSH_TOKEN}" ]]; then
            echo "Repository secret RELAY_PUSH_TOKEN is required to push deploy/k8s updates on protected main." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELAY_PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git add deploy/k8s/deployment.yaml
          git commit -m "chore: deploy relay-api image sha-${{ github.sha }}"
          git push origin HEAD:main
