name: publish-relay-api

on:
  push:
    branches:
      - main
    paths-ignore:
      - "deploy/k8s/**"
      - "README.md"
      - "web/**"
      - ".github/workflows/publish-relay-web.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build-and-sync-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/4gly/relay-api:main
            ghcr.io/4gly/relay-api:sha-${{ github.sha }}

      - name: Update deployment image tag
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path("deploy/k8s/deployment.yaml")
          text = path.read_text()
          old = "image: ghcr.io/4gly/relay-api:bootstrap"
          if "image: ghcr.io/4gly/relay-api:sha-" in text:
              import re
              text = re.sub(r"image: ghcr.io/4gly/relay-api:sha-[0-9a-f]{40}", f"image: ghcr.io/4gly/relay-api:sha-${{ github.sha }}", text)
          else:
              text = text.replace(old, f"image: ghcr.io/4gly/relay-api:sha-${{ github.sha }}")
          path.write_text(text)
          PY

      - name: Open manifest sync PR
        env:
          GH_TOKEN: ${{ secrets.RELAY_PUSH_TOKEN }}
          RELAY_PUSH_TOKEN: ${{ secrets.RELAY_PUSH_TOKEN }}
          RELAY_PUSH_USERNAME: ${{ vars.RELAY_PUSH_USERNAME }}
        run: |
          if git diff --quiet -- deploy/k8s/deployment.yaml; then
            exit 0
          fi
          if [[ -z "${RELAY_PUSH_TOKEN}" ]]; then
            echo "Repository secret RELAY_PUSH_TOKEN is required to create manifest sync PRs that trigger downstream workflows." >&2
            exit 1
          fi
          if [[ -z "${RELAY_PUSH_USERNAME}" ]]; then
            echo "Repository variable RELAY_PUSH_USERNAME is required to identify the manifest sync actor." >&2
            exit 1
          fi
          if [[ "$(gh api repos/${{ github.repository }} --jq '.allow_auto_merge')" != "true" ]]; then
            echo "Repository setting allow_auto_merge must be enabled for manifest sync PRs." >&2
            exit 1
          fi
          branch="automation/relay-api-deploy-${{ github.sha }}"
          title="chore: deploy relay-api image sha-${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://${RELAY_PUSH_USERNAME}:${RELAY_PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -b "${branch}"
          git add deploy/k8s/deployment.yaml
          git commit -m "${title}"
          git push --force-with-lease origin HEAD:"${branch}"
          pr_url="$(gh pr list --state open --base main --head "${branch}" --json url --jq '.[0].url')"
          if [[ -z "${pr_url}" ]]; then
            pr_url="$(gh pr create \
              --base main \
              --head "${branch}" \
              --title "${title}" \
              --body $'Automated manifest sync after image publish.\n\n- built image: `ghcr.io/4gly/relay-api:sha-${{ github.sha }}`\n- updated file: `deploy/k8s/deployment.yaml`')"
          fi
          gh pr merge --auto --squash "${pr_url}"
