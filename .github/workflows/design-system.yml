name: design-system

on:
  pull_request:
    branches:
      - main
    paths:
      - "DESIGN.md"
      - "docs/design-system.md"
      - "web/package.json"
      - "web/package-lock.json"
      - ".github/workflows/design-system.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: design-system-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  design-md:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Lint DESIGN.md token contract
        run: npm --prefix web run design:lint

      - name: Validate implementation contract docs
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const text = fs.readFileSync("docs/design-system.md", "utf8");
          const required = [
            "DESIGN.md is the canonical visual identity source",
            "web/app/globals.css",
            "web/components/relay/*",
            "npm --prefix web run design:lint",
            "https://github.com/google-labs-code/design.md"
          ];
          const missing = required.filter((item) => !text.includes(item));
          if (missing.length > 0) {
            console.error(`Missing design-system contract strings: ${missing.join(", ")}`);
            process.exit(1);
          }
          console.log("docs/design-system.md contract strings are present");
          NODE
