        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/snapshots/{snapshot_id}/revoke:
    post:
      tags: [snapshots]
      summary: Revoke public access to a packet snapshot
      description: >
        Admin-only. Flips `public_readable` to FALSE and requests cache
        invalidation for the public and OG image URLs. The token and og_image_path
        are preserved in the row so a subsequent publish can re-use the
        invalidator paths.
      operationId: revokeSnapshot
      security:
        - BearerAuth: []
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Snapshot revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotRevokeResponse'
        '401':
          description: Missing or invalid admin bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /p/{token}:
    get:
      tags: [public-snapshot]
      summary: View a publicly shared packet snapshot
      description: >
        Unauthenticated. Serves an SSR HTML page with full OG meta tags for
        the given public token. Returns 410 Gone when the token is unknown or
        the snapshot has been revoked.
      operationId: viewPublicSnapshot
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public snapshot HTML page
          content:
            text/html:
              schema:
                type: string
        '410':
          description: Snapshot not found or no longer public
          content:
            text/html:
              schema:
                type: string
  /p/{token}/og.png:
    get:
      tags: [public-snapshot]
      summary: Fetch the OG card PNG for a public snapshot
      description: >
        Unauthenticated. Returns the pre-generated 1200×630 OG image PNG.
        Regenerates the image on-the-fly if the stored file is missing
        (e.g. after a container restart). Returns 410 Gone when the token is
        unknown or the snapshot has been revoked.
      operationId: publicSnapshotOGImage
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OG card PNG (1200×630)
          content:
            image/png:
              schema:
                type: string
                format: binary
        '410':
          description: Snapshot not found or no longer public
          content:
            text/html:
              schema:
                type: string
  /v1/auth/{provider}/start:
    get:
      tags: [auth]
      summary: Begin an OAuth sign-in by redirecting to the provider
      operationId: startOAuth
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [github, google]
        - name: redirect_to
          in: query
          required: false
          description: Optional in-app path to land on after callback completes.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to provider authorization URL
        '404':
          description: Provider is not configured on this Relay deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/auth/{provider}/callback:
    get:
      tags: [auth]
      summary: OAuth callback that issues a session cookie and redirects back
      operationId: oauthCallback
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [github, google]
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the original redirect_to (or `/` when empty)
        '400':
          description: Missing required code or state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: OAuth state invalid, expired, or already consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Provider is not configured on this Relay deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Upstream OAuth provider exchange failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/auth/me:
    get:
      tags: [auth]
      summary: Return the user identified by the relay_session cookie
      operationId: authMe
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          description: Missing or invalid session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current session and clear the cookie
      operationId: authLogout
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutResponse'
  /v1/onboarding:
    post:
      tags: [onboarding]
      summary: Complete first-run onboarding without a provider key
      description: |
        Creates or resolves the cookie-session user's default "Personal" project and
        marks first-run onboarding complete. Anthropic key connection is deliberately
        not part of this endpoint; users can enter Relay before deciding whether to
        connect a Claude provider key.

        Auth: cookie session. Admin bearer is rejected (no user identity to bind the
        row to). Strict decoder: any unknown field, including anthropic_key or the
        legacy relay_url field, returns 400 UNKNOWN_JSON_FIELD.
      operationId: onboardingComplete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingCompleteInput'
      responses:
        '200':
          description: Onboarding completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingCompleteResponse'
        '400':
          description: |
            Validation failed. error.code is one of:
            UNKNOWN_JSON_FIELD.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing session cookie or admin-only bearer (admin has no user identity to bind to)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server misconfiguration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [onboarding]
      summary: Forget the user's Anthropic API key
      description: |
        NULLs the encrypted key + nonce + aad_salt + last_validated_at.
        The row, default_project_id, and onboarding_completed_at remain so the user
        does not get sent back through first-run onboarding after disconnecting a
        provider key.
      operationId: onboardingDeleteKey
      responses:
        '200':
          description: Key forgotten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingDeleteResponse'
        '401':
          description: Missing session cookie or admin-only bearer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: User has not completed onboarding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/settings/provider-credentials:
    get:
      tags: [settings]
      summary: List connected provider credentials for the current user
      description: |
        Returns display-safe provider credential status. Raw API keys and
        ciphertext are never returned. Auth: cookie session only; admin bearer
        is rejected because credentials are user-owned.
      operationId: providerCredentialsList
      responses:
        '200':
          description: Provider credential statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCredentialListResponse'
        '401':
          description: Missing session cookie or admin-only bearer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [settings]
      summary: Connect or replace a provider credential
      description: |
        Encrypts a provider API key into user_provider_credentials. This is the
        Settings-owned provider flow; first-run onboarding never asks for this key.
      operationId: providerCredentialUpsert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderCredentialUpsertInput'
      responses:
        '200':
          description: Provider credential connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCredentialStatusResponse'
        '400':
          description: Unknown field, missing field, or invalid provider key shape
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing session cookie or admin-only bearer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server misconfiguration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/settings/provider-credentials/{provider}:
    delete:
      tags: [settings]
      summary: Disconnect a provider credential
      description: Soft-deletes the provider credential without changing onboarding state.
      operationId: providerCredentialDelete
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [anthropic]
      responses:
        '200':
          description: Provider credential disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCredentialDeleteResponse'
        '401':
          description: Missing session cookie or admin-only bearer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Provider credential is not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
